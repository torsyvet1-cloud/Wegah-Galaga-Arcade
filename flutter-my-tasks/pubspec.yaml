name: flutter_my_tasks
description: "Aplicação de Lista de Tarefas com Flutter. Gerencia tarefas com armazenamento local."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Database
  sqflite: ^2.2.0
  path_provider: ^2.1.0

  # Utilities
  intl: ^0.18.0
  uuid: ^4.0.0
  json_annotation: ^4.8.0

  # Local Notifications
  flutter_local_notifications: ^14.0.0

  # Preferences
  shared_preferences: ^2.2.0

  # Icons
  cupertino_icons: ^1.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  json_serializable: ^6.7.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/

  # Fonts
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600